name: Build StackErp Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Tag da imagem"
        required: false
        default: "manual"
  push:
    branches:
      - main
      - Layout-geral

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout stackerp
        uses: actions/checkout@v4

      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Set image metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
          elif [ "${{ github.ref_name }}" = "main" ]; then
            TAG="latest"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ github.repository_owner }}/stackerp" >> "$GITHUB_OUTPUT"

      - name: Write apps.json
        run: |
          cat > apps.json <<EOF
          [
            {
              "url": "https://github.com/${{ github.repository }}.git",
              "branch": "${{ github.ref_name }}"
            }
          ]
          EOF

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          docker build \
            --build-arg FRAPPE_PATH=https://github.com/frappe/frappe \
            --build-arg FRAPPE_BRANCH=version-16 \
            --secret id=apps_json,src=apps.json \
            --tag "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}" \
            --file frappe_docker/images/custom/Containerfile \
            frappe_docker
          docker push "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}"
